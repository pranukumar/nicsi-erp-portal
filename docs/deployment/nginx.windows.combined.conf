upstream nextjs_local {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;

    root C:/nginx-1.28.2/nginx-1.28.2/html/nicsi;
    index index.html;
    client_max_body_size 25m;
    server_tokens off;

    location = / {
        return 302 /nicsi/;
    }

    location = /nicsi {
        return 301 /nicsi/;
    }

    location /nicsi/_next/static/ {
        proxy_pass http://nextjs_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* ^/nicsi/(images|logos|icons|pdfs|maps|photos|videos|presentations)/ {
        proxy_pass http://nextjs_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /nicsi/ {
        proxy_pass http://nextjs_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /home {
        return 301 /home/;
    }

    location = /home/index.html {
        try_files $uri =404;
    }

    location /home/_next/static/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~* ^/home/(images|logos|icons|pdfs|maps|photos|videos|presentations)/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /home/ {
        try_files $uri $uri/ /home/index.html;
    }
}
