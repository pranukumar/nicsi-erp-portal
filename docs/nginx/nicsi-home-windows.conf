server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;

    root D:/deploy/nicsi;
    index index.html;

    location = / {
        return 302 /home/;
    }

    location = /home {
        return 301 /home/;
    }

    location /home/_next/static/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~* ^/home/(images|logos|icons|pdfs|maps|photos|videos|presentations)/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /home/ {
        try_files $uri $uri/ /home/index.html;
    }
}
