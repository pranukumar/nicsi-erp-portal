      <stop offset="52%" stop-color="#233d8e" />
      <stop offset="100%" stop-color="#0c2f6f" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1570d4" />
      <stop offset="100%" stop-color="#0956b0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#031a44" flood-opacity="0.28" />
    </filter>
    <style>
      .tile { fill:#d9d9dd; stroke:#f8fafc; stroke-width:2.4; rx:12; ry:12; }
      .island { fill:#d9d9dd; stroke:#f8fafc; stroke-width:2; }
      .label-title { font: 700 19px Arial, sans-serif; fill:#ffffff; }
      .label-sub { font: 400 16px Arial, sans-serif; fill:#ffffff; }
      .label-strong { font: 700 17px Arial, sans-serif; fill:#111827; }
      .label-light { font: 400 14px Arial, sans-serif; fill:#111827; }
      .server { fill:url(#panel); rx:8; ry:8; }
      .server-detail { stroke:#9ed0ff; stroke-width:2; stroke-linecap:round; opacity:0.9; }
    </style>
  </defs>

