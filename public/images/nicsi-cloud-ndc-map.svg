<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">NICSI attached NDC locations across India</title>
  <desc id="desc">Map showing NICSI attached National Data Centres at Delhi, Guwahati, Bhubaneswar, Pune, and Hyderabad with rack capacity labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
