  <g id="MH" transform="translate(340,360)"><title>Maharashtra</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">MH</text></g>
  <g id="CG" transform="translate(418,360)"><title>Chhattisgarh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">CG</text></g>
  <g id="OD" transform="translate(496,360)"><title>Odisha</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">OD</text></g>
  <g id="TR" transform="translate(808,360)"><title>Tripura</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">TR</text></g>
  <g id="MZ" transform="translate(886,360)"><title>Mizoram</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">MZ</text></g>

  <!-- Row 6 -->
  <g id="GA" transform="translate(262,420)"><title>Goa</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">GA</text></g>
  <g id="KA" transform="translate(340,420)"><title>Karnataka</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">KA</text></g>
  <g id="TG" transform="translate(418,420)"><title>Telangana</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">TG</text></g>
  <g id="AP" transform="translate(496,420)"><title>Andhra Pradesh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">AP</text></g>

  <!-- Row 7 -->
  <g id="LD" transform="translate(184,480)"><title>Lakshadweep</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">LD</text></g>
  <g id="KL" transform="translate(340,480)"><title>Kerala</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">KL</text></g>
  <g id="TN" transform="translate(418,480)"><title>Tamil Nadu</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">TN</text></g>
  <g id="PY" transform="translate(496,480)"><title>Puducherry</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">PY</text></g>

  <!-- Row 8 -->
