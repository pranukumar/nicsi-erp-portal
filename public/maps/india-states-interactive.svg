<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">India States and Union Territories Interactive Tile Map</title>
  <desc id="desc">Tile-based SVG map defining all 28 states and 8 union territories by code.</desc>
  <rect x="0" y="0" width="1200" height="780" fill="#f8fbff"/>
  <style>
    .tile { fill:#ffffff; stroke:#b6c9e6; stroke-width:2; rx:10; ry:10; }
    .tile:hover { fill:#eaf2ff; stroke:#2f66c9; }
    .code { font:700 16px Arial, sans-serif; fill:#0f2f66; pointer-events:none; }
    .meta { font:12px Arial, sans-serif; fill:#5a6b85; pointer-events:none; }
    .heading { font:700 28px Arial, sans-serif; fill:#0f172a; }
    .sub { font:14px Arial, sans-serif; fill:#475569; }
  </style>
  <text x="44" y="54" class="heading">India State/UT Tile Map</text>
  <text x="44" y="78" class="sub">Codes for all States and Union Territories</text>

  <!-- Row 1 -->
  <g id="LA" transform="translate(340,120)"><title>Ladakh</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">LA</text></g>
  <g id="JK" transform="translate(418,120)"><title>Jammu and Kashmir</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">JK</text></g>

  <!-- Row 2 -->
  <g id="HP" transform="translate(418,180)"><title>Himachal Pradesh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">HP</text></g>
  <g id="PB" transform="translate(496,180)"><title>Punjab</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">PB</text></g>
  <g id="CH" transform="translate(574,180)"><title>Chandigarh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">CH</text></g>
  <g id="UK" transform="translate(652,180)"><title>Uttarakhand</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">UK</text></g>
  <g id="AR" transform="translate(808,180)"><title>Arunachal Pradesh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">AR</text></g>

  <!-- Row 3 -->
  <g id="RJ" transform="translate(340,240)"><title>Rajasthan</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">RJ</text></g>
  <g id="HR" transform="translate(418,240)"><title>Haryana</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">HR</text></g>
  <g id="DL" transform="translate(496,240)"><title>Delhi</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">DL</text></g>
  <g id="UP" transform="translate(574,240)"><title>Uttar Pradesh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">UP</text></g>
  <g id="BR" transform="translate(652,240)"><title>Bihar</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">BR</text></g>
  <g id="SK" transform="translate(730,240)"><title>Sikkim</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">SK</text></g>
  <g id="AS" transform="translate(808,240)"><title>Assam</title><rect class="tile" width="70" height="52"/><text class="code" x="15" y="30">AS</text></g>
  <g id="NL" transform="translate(886,240)"><title>Nagaland</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">NL</text></g>

