  <g id="GJ" transform="translate(262,300)"><title>Gujarat</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">GJ</text></g>
  <g id="MP" transform="translate(340,300)"><title>Madhya Pradesh</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">MP</text></g>
  <g id="JH" transform="translate(652,300)"><title>Jharkhand</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">JH</text></g>
  <g id="WB" transform="translate(730,300)"><title>West Bengal</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">WB</text></g>
  <g id="ML" transform="translate(808,300)"><title>Meghalaya</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">ML</text></g>
  <g id="MN" transform="translate(886,300)"><title>Manipur</title><rect class="tile" width="70" height="52"/><text class="code" x="14" y="30">MN</text></g>

