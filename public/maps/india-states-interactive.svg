  <!-- Legend -->
  <rect x="44" y="640" width="1112" height="96" rx="12" ry="12" fill="#ffffff" stroke="#d7e3f6"/>
  <text x="64" y="673" class="code">States (28): AP AR AS BR CG GA GJ HR HP JH KA KL MP MH MN ML MZ NL OD PB RJ SK TN TG TR UP UK WB</text>
  <text x="64" y="704" class="code">UTs (8): AN CH DN DL JK LA LD PY</text>
  <text x="64" y="726" class="meta">Use this SVG for interactive state/UT mapping in web UI.</text>
</svg>
